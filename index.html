<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaqueline JV Design</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 90px 20px;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
    }

    h1 {
      font-size: 50px;
      margin: 0;
    }

    p {
      font-size: 18px;
      opacity: 0.85;
    }

    .section {
      padding: 60px 20px;
    }

    .card {
      background: #1c1c1c;
      margin: 20px auto;
      padding: 25px;
      max-width: 500px;
      border-radius: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #2575fc;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    footer {
      padding: 25px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <h1>Jaqueline JV Design</h1>
    <p>Creative Studio • Branding • Web Design</p>
  </header>

  <div class="section">
    <div class="card">
      <h2>About</h2>
      <p>Minimal & modern design studio focused on clean branding and web experiences.</p>
    </div>

    <div class="card">
      <h2>Services</h2>
      <p>Logo Design<br>Website Design<br>Brand Identity</p>
    </div>

    <div class="card">
      <h2>Contact</h2>
      <a class="btn" href="mailto:jackie.vlachou@gmail.com">Email Me</a>
    </div>
  </div>

  <footer>
    © 2026 Jaqueline JV Design
  </footer>

</body>
</html>
